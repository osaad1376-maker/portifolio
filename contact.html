        <form class="w-50 m-auto text-light pt-5" onsubmit="Forme(event)">
            <div class="row">
                <div class="col-12 col-sm-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                    <label class="text-black fw-bold">First name</label>
                    <input type="text" class="form-control py-3" id="fname">
                    <p id="pfname" class="text-danger"></p>
                </div>

                <div class="col-12 col-sm-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                    <label class="text-black fw-bold">Last name</label>
                    <input type="text" class="form-control py-3" id="lname">
                    <p id="plname" class="text-danger"></p>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12 col-sm-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                    <label class="text-black fw-bold">Email</label>
                    <input type="email" class="form-control py-3" id="email">
                    <p id="pemail" class="text-danger"></p>
                </div>

                <div class="col-12 col-sm-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                    <label class="text-black fw-bold">Phone</label>
                    <input type="number" class="form-control py-3" id="phon">
                    <p id="pphone" class="text-danger"></p>
                </div>
            </div>

          <div class="row">
              <button type="submit"
                class="fw-bold btn btn-primary px-5 py-3 mt-5 col-12 col-sm-12 col-md-6 col-lg-6 col-xl-4 col-xxl-4 m-auto">
                Send Message
            </button>
             
          </div>
        </form>
        <script>
            function Forme(event) {

                event.preventDefault();

                let Fname = document.getElementById("fname").value;
                let Lname = document.getElementById("lname").value;
                let email = document.getElementById("email").value;
                let phone = document.getElementById("phon").value;

                let pfname = document.getElementById("pfname");
                let plname = document.getElementById("plname");
                let pemail = document.getElementById("pemail");
                let pphone = document.getElementById("pphone");

                pfname.innerHTML = "";
                plname.innerHTML = "";
                pemail.innerHTML = "";
                pphone.innerHTML = "";

                if (Fname === "") {
                    pfname.innerHTML = "Please enter your first name";
                }

                if (Lname === "") {
                    plname.innerHTML = "Please enter your last name";
                }

                if (email.indexOf("@") === -1 && email.indexOf(".") === -1) {
                    pemail.innerHTML = "Please enter your email";
                }

                if (phone.length != 11) {
                    pphone.innerHTML = "Please enter your phone number";
                }
                else {
                    alert("sending sucsses")
                }
            }
        </script>
